version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: xianyu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-xianyu123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xianyu}
      MYSQL_USER: ${MYSQL_USER:-xianyu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-xianyu123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - xianyu-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianyu-backend
    restart: always
    depends_on:
      - mysql
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-xianyu}:${MYSQL_PASSWORD:-xianyu123}@mysql:3306/${MYSQL_DATABASE:-xianyu}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - xianyu-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: xianyu-redis
    restart: always
    networks:
      - xianyu-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xianyu-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - xianyu-network

networks:
  xianyu-network:
    driver: bridge

volumes:
  mysql_data:
